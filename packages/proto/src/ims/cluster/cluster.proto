syntax = "proto3";
package ims.cluster;

import "google/protobuf/timestamp.proto";

service ClusterService {
  rpc InitCluster(InitClusterRequest) returns (Task);
}

message InitClusterRequest {
  string name = 1;
  oneof config {
    ProxmoxConfig proxmox = 2;
    VCenterConfig vcenter = 3;
  }
}

message ProxmoxConfig {
  string node_name = 1;
  int32 storage_id = 2;
}

message VCenterConfig {
  string datacenter_path = 1;
}

message Task {
  string id = 1;
  google.protobuf.Timestamp started_at = 2;
}
